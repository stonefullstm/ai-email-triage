rules:
  - label: REVIEW_RECOMMENDED
    confidence: 0.90
    subject_patterns:
      - security
      - vulnerability
      - alert
      - warning

  - label: FYI_IGNORE
    confidence: 0.95
    subject_patterns:
      - ganhe
      - grátis
      - promoção
      - cashback
    body_patterns:
      - unsubscribe
      - descadastre-se

  - label: REFERENCE_ONLY
    confidence: 0.88
    subject_patterns:
      - transferencia
      - transferência
      - receipt
      - invoice
      - nota fiscal
  
  - label: ACTION_REQUIRED
    confidence: 0.85
    subject_patterns:
      - confirm
      - verify
      - action required
